<!DOCTYPE html>
<html lang="en">
  <head>

  <body>
    <div class="container">
      <img src="images/SpaceshipAlien.jpg" alt="Alien In Spaceship">
      <div class="story">
        <p>
          On <b><span id="date"></span></b>, explorer <b><span id="name"></span></b> crash-landed on Planet <b><span id="planet"></span></b> after their spaceship hit a giant floating <b><span id="floating"></span></b>.
        </p>
        <p>
          The local aliens looked like giant <b><span id="aliens"></span></b> with <b><span id="eyes"></span></b> eyes. To survive, you had to:
        </p>
        <ul>
          <li>Eat radioactive <b><span id="eat"></span></b></li>
          <li>Ride a wild space <b><span id="ride"></span></b></li>
          <li>Escape from the evil Emperor <b><span id="escape"></span></b></li>
        </ul>
        <p>
          Luckily, your emergency <b><span id="emergency"></span></b> saved the day.
        </p>
      </div>
    </div>
    <script src="/js/script.js"></script>
